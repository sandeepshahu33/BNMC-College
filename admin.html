<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin </title>
    <link rel="icon" href="img/logo1.png">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="ad-bg">
    <div class="container">
        <div class="row">
            <div class="col-sm-12">
                <div class="admin-outer mx-auto">
                    <h2 class="text-center text-secondary pt-3"><b>Admin Panel</b></h2>
                    <h4 class=" text-secondary ps-4 mt-4 ad-wel">Welcome to Admin Panel! 👋</h4>
                    <p class=" text-secondary ps-4">Please sign-in to your account !</p>
                    <form>
                        <div class="mx-3">
                            <div class="alert alert-danger alert-dismissible fade show py-3" role="alert">
                            <p class=" m-0 alert-color ad-message">Your session has been expired</p>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        </div>
                        <div class="mb-3 px-3">
                            <label for="exampleInputEmail1" class="form-label">Email </label>
                            <input type="email" class="form-control" id="exampleInputEmail1"
                                aria-describedby="emailHelp" placeholder="Enter Your Email">

                        </div>
                        <div class="mb-3 px-3">
                            <label for="exampleInputPassword1" class="form-label">Password</label>
                            <input type="password" class="form-control" id="exampleInputPassword1"
                                placeholder="Enter Your Password">
                        </div>

                        <button type="submit" class="btn btn-primary px-3 ad-btn d-block mx-auto">Sign in</button>
                        <div class="text-center py-4 "><a href="index.html" class="text-decoration-none"><i class="fa-solid fa-arrow-left fa-xs"></i> Back to home</a></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.js"></script>
</body>

</html>
